name: Deploy web (Astro → Azure Static Web Apps)

# Story 1.3 (FR-17): publish-on-push. A push to main that touches the web app (or this
# workflow) builds the Astro site and deploys it to the Static Web App provisioned in
# Story 1.2. Build runs BEFORE deploy, so a failed build never reaches the live site.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'api/**'
      - 'content/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # One deploy at a time per ref. Do NOT cancel in-progress: aborting an SWA upload
  # mid-flight is not a clean signal, so queue the next deploy instead of cancelling.
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Deterministic build from the committed lockfile — NOT Oryx auto-build.
      # If this step fails, the job stops here and the deploy step never runs (AC: failed build does not deploy).
      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      # Story 2.7 (FR-14): install the API deps and run the content-bundle step so the
      # negotiation Function ships with a verbatim copy of content/**/*.md + a generated
      # slug->file manifest (Decision A). This MUST run before the API is packaged so the
      # Function can read the raw .md at runtime. Byte-exact copy (no read-as-text) keeps
      # AC6 fidelity. The web/dist upload is unchanged (still skip_app_build).
      - name: Install API dependencies
        working-directory: api
        run: npm install --no-audit --no-fund

      - name: Bundle content for the API (slug->.md manifest + verbatim copy)
        working-directory: api
        run: npm run build

      # Upload the prebuilt static output AND deploy the linked Functions API. skip_app_build
      # avoids re-running the Astro build in the action; the API at api_location is deployed
      # alongside web/dist so Accept: text/markdown reaches the negotiate Function.
      - name: Deploy to Azure Static Web Apps
        # SHA-pinned (v1) — this action receives the deployment token, so pin for supply-chain safety.
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          # Upload the prebuilt static output. With skip_app_build, app_location IS the output dir
          # and output_location must be empty (documented prebuilt-app pattern).
          app_location: 'web/dist'
          output_location: ''
          # Story 2.7 (AC7): deploy the content-negotiation Function alongside the static app.
          # No secret/subscription-id is hard-coded — the deploy token is the only credential.
          api_location: 'api'
          skip_app_build: true
