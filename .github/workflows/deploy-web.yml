name: Deploy web (Astro → Azure Static Web Apps)

# Story 1.3 (FR-17): publish-on-push. A push to main that touches the web app (or this
# workflow) builds the Astro site and deploys it to the Static Web App provisioned in
# Story 1.2. Build runs BEFORE deploy, so a failed build never reaches the live site.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # One deploy at a time per ref; a newer push supersedes an in-flight run.
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Deterministic build from the committed lockfile — NOT Oryx auto-build.
      # If this step fails, the job stops here and the deploy step never runs (AC: failed build does not deploy).
      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      # Upload the prebuilt static output. skip_app_build avoids re-running a build in the action.
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: 'web/dist'
          skip_app_build: true
          skip_api_build: true
