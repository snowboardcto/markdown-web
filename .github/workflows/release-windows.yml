name: Release Windows client (installer)

# Builds the native Windows client as a SELF-CONTAINED win-x64 app, wraps it in an Inno Setup
# installer (TheMarkdownWeb-Setup-<version>.exe), and publishes it as a GitHub Release asset.
#
# Triggers:
#   - push of a tag matching v* (e.g. v0.1.0) -> versioned release
#   - manual workflow_dispatch (version defaults to 0.1.0-dev.<run_number>)
#
# The release asset is built with the repo's GITHUB_TOKEN (no extra secret) and published to a
# public GitHub Release (the repo is public), so themarkdownweb.com/get can link to it anonymously.
#
# CODE SIGNING (Azure Trusted Signing): when the repo variable SIGNING_ENABLED=='true', the app exe
# and the installer are Authenticode-signed via OIDC (no stored secret) so Windows SmartScreen
# trusts them. Until that variable is set, builds are produced UNSIGNED (SmartScreen prompts). The
# required repo VARIABLES are: SIGNING_ENABLED, AZURE_CLIENT_ID, AZURE_TENANT_ID,
# AZURE_SUBSCRIPTION_ID, TRUSTED_SIGNING_ENDPOINT, TRUSTED_SIGNING_ACCOUNT, TRUSTED_SIGNING_PROFILE.

on:
  push:
    tags:
      - 'v*'
    # Also build the installer + refresh the rolling v0.1.0 release whenever the client changes on
    # main, so themarkdownweb.com/get always has a current download (tag pushes / workflow_dispatch
    # are not available from every environment). Scoped to the client + installer + this workflow so
    # web/content-only changes don't rebuild the 150MB installer.
    branches:
      - main
    paths:
      - 'clients/windows/App/**'
      - 'clients/windows/Rendering/**'
      - 'clients/windows/Agent/**'
      - 'clients/windows/installer/**'
      - 'clients/windows/TheMarkdownWeb.sln'
      - '.github/workflows/release-windows.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, no leading v)'
        required: false
        default: ''

permissions:
  contents: write   # create the GitHub Release + upload the installer asset
  id-token: write   # OIDC login to Azure Trusted Signing (no long-lived secret)

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_installer:
    runs-on: windows-latest
    name: Build self-contained installer
    timeout-minutes: 25
    env:
      APP_PROJECT: clients/windows/App/TheMarkdownWeb.App.csproj
      ISS: clients/windows/installer/TheMarkdownWeb.iss
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = '${{ github.event.inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($v)) {
            if ($env:GITHUB_REF -like 'refs/tags/v*') {
              $v = $env:GITHUB_REF -replace '^refs/tags/v',''
            } else {
              # Plain main push / dispatch with no input: a STABLE rolling version so the release tag
              # stays v0.1.0 and the installer asset is refreshed in place (no release proliferation).
              $v = '0.1.0'
            }
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          # Inno's AppVersion wants a numeric x.y.z; strip any pre-release suffix for that field.
          $num = ($v -split '-')[0]
          "numeric=$num" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Release version: $v (numeric $num)"

      # Self-contained so the end user needs no .NET runtime. WPF cannot be trimmed, so this is a
      # full runtime copy (~150MB on disk); the installer compresses it (lzma2/max).
      - name: Publish (self-contained win-x64)
        shell: pwsh
        run: |
          dotnet publish $env:APP_PROJECT `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=false `
            -o publish
          if (-not (Test-Path 'publish/TheMarkdownWeb.App.exe')) {
            throw 'publish/TheMarkdownWeb.App.exe not found — publish failed'
          }

      # --- Code signing (Azure Trusted Signing) -------------------------------------------------
      # Gated on the repo VARIABLE `SIGNING_ENABLED == 'true'` so the workflow keeps producing
      # (unsigned) builds until the Azure Trusted Signing account + OIDC federated credential are
      # set up. Flip the variable to 'true' once the Azure setup is done — no workflow edit needed.
      # Auth is OIDC (azure/login) — no signing secret stored in the repo.
      - name: Azure login (OIDC) for signing
        if: ${{ vars.SIGNING_ENABLED != '' && vars.SIGNING_ENABLED != 'false' && vars.SIGNING_ENABLED != '0' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sign the app executable (Authenticode)
        if: ${{ vars.SIGNING_ENABLED != '' && vars.SIGNING_ENABLED != 'false' && vars.SIGNING_ENABLED != '0' }}
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\publish
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          $publishAbs = (Resolve-Path 'publish').Path
          & "$iscc" "/DPublishDir=$publishAbs" "/DAppVersion=${{ steps.ver.outputs.numeric }}" $env:ISS
          $setup = "clients/windows/installer/installer-out/TheMarkdownWeb-Setup.exe"
          if (-not (Test-Path $setup)) { throw "installer not found at $setup" }
          "SETUP_PATH=$setup" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Built installer: $setup ($([math]::Round((Get-Item $setup).Length/1MB,1)) MB)"

      # Sign the installer itself (the file the user actually double-clicks — this is what SmartScreen
      # checks first). The app exe inside was already signed pre-package above.
      - name: Sign the installer (Authenticode)
        if: ${{ vars.SIGNING_ENABLED != '' && vars.SIGNING_ENABLED != 'false' && vars.SIGNING_ENABLED != '0' }}
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\clients\windows\installer\installer-out
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheMarkdownWeb-Setup-${{ steps.ver.outputs.version }}
          path: ${{ env.SETUP_PATH }}
          if-no-files-found: error

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNING_ENABLED: ${{ vars.SIGNING_ENABLED }}
        run: |
          $tag = if ($env:GITHUB_REF -like 'refs/tags/v*') { $env:GITHUB_REF -replace '^refs/tags/','' } else { "v${{ steps.ver.outputs.version }}" }
          $signNote = if ($env:SIGNING_ENABLED -eq 'true') {
            "Code-signed (Azure Trusted Signing)."
          } else {
            "Unsigned for now — SmartScreen may prompt; choose More info -> Run anyway."
          }
          $notes = "Native Windows client (self-contained, no .NET runtime required). $signNote"
          # Create the release if it doesn't exist, then upload (clobber) the installer asset.
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "The Markdown Web $tag" --notes "$notes" --target $env:GITHUB_SHA
          }
          gh release upload $tag "$env:SETUP_PATH" --clobber
